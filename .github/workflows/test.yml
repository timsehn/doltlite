name: Test Suite

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y tcl-dev build-essential zlib1g-dev

    - name: Configure
      run: |
        mkdir -p build && cd build
        TCL_CONFIG=$(find /usr -name tclConfig.sh 2>/dev/null | head -1)
        if [ -n "$TCL_CONFIG" ]; then
          ../configure --with-tcl=$(dirname $TCL_CONFIG)
        else
          ../configure
        fi

    - name: Build doltlite
      run: cd build && make doltlite

    - name: Verify engine
      run: |
        cd build
        echo "SELECT doltlite_engine();" | ./doltlite :memory: | grep -q "prolly"
        echo "Engine: prolly (verified)"

    - name: Branding tests
      run: cd build && bash ../test/doltlite_branding.sh

    - name: Smoke test
      run: |
        cd build
        echo "
        CREATE TABLE t(x INTEGER PRIMARY KEY, y TEXT);
        INSERT INTO t VALUES(1,'hello'),(2,'world'),(3,'test');
        SELECT * FROM t ORDER BY x;
        DELETE FROM t WHERE x=2;
        UPDATE t SET y='updated' WHERE x=1;
        SELECT count(*) FROM t;
        BEGIN; INSERT INTO t VALUES(4,'rollback'); ROLLBACK;
        SELECT count(*) FROM t;
        " | ./doltlite :memory:

    - name: File persistence test
      run: |
        cd build
        echo "CREATE TABLE t(x INTEGER PRIMARY KEY, y TEXT); INSERT INTO t VALUES(1,'persist');" | ./doltlite /tmp/test.db
        result=$(echo "SELECT y FROM t;" | ./doltlite /tmp/test.db)
        [ "$result" = "persist" ] && echo "Persistence: OK" || (echo "Persistence: FAIL" && exit 1)

    - name: Dolt commit and log tests
      run: cd build && bash ../test/doltlite_commit.sh

    - name: Dolt staging workflow tests
      run: cd build && bash ../test/doltlite_staging.sh

    - name: Dolt diff tests
      run: cd build && bash ../test/doltlite_diff.sh

    - name: Dolt reset tests
      run: cd build && bash ../test/doltlite_reset.sh

    - name: Dolt branch tests
      run: cd build && bash ../test/doltlite_branch.sh

    - name: Dolt merge tests
      run: cd build && bash ../test/doltlite_merge.sh

    - name: Dolt tag tests
      run: cd build && bash ../test/doltlite_tag.sh

    - name: Dolt conflicts tests
      run: cd build && bash ../test/doltlite_conflicts.sh

    - name: Dolt per-row conflict resolution tests
      run: cd build && bash ../test/doltlite_conflict_rows.sh

    - name: Dolt cherry-pick and revert tests
      run: cd build && bash ../test/doltlite_cherry_pick.sh

    - name: Dolt diff audit log tests
      run: cd build && bash ../test/doltlite_diff_table.sh

    - name: Dolt history table tests
      run: cd build && bash ../test/doltlite_history.sh

    - name: Dolt point-in-time query tests
      run: cd build && bash ../test/doltlite_at.sh

    - name: Dolt schema diff tests
      run: cd build && bash ../test/doltlite_schema_diff.sh

    - name: Dolt garbage collection tests
      run: cd build && bash ../test/doltlite_gc.sh

    - name: Deep feature coverage tests
      run: cd build && bash ../test/doltlite_feature_deep.sh

    - name: Dolt getting-started demo test
      run: cd build && bash ../test/doltlite_demo.sh

    - name: End-to-end integration test
      run: cd build && bash ../test/doltlite_e2e.sh

    - name: Edge case tests
      run: cd build && bash ../test/doltlite_edge_cases.sh

    - name: Advanced tests
      run: cd build && bash ../test/doltlite_advanced.sh

    - name: Concurrent branch test
      run: |
        cd build
        make libsqlite3.a USE_AMALGAMATION=0
        cc -g -O0 -I. -I../src -DDOLTLITE_PROLLY=1 -D_HAVE_SQLITE_CONFIG_H -DBUILD_sqlite \
          -o concurrent_branch_test ../test/concurrent_branch_test.c \
          libsqlite3.a -lz -lpthread -lm
        ./concurrent_branch_test

    - name: Build testfixture
      run: cd build && make testfixture

    - name: Run core test suite
      run: |
        cd build
        total=0
        errors=0
        for test in insert select1 select2 select3 select4 delete update \
                     trans savepoint where expr index alter attach auth \
                     coalesce conflict cse date join subquery vacuum view \
                     between cast check limit null quote rowid sort types \
                     types2 in in2 in3 in4 in5 in6 intpkey like like2 \
                     minmax minmax2 minmax3 select5 select6 select7 \
                     selectA selectB distinctagg enc count capi2 capi3 \
                     collate1 collate2 collate3 collate4 \
                     fkey1 fkey2 fkey5 \
                     trigger1 trigger2 triggerA triggerB triggerC; do
          result=$(timeout 120 ./testfixture ../test/${test}.test 2>&1)
          done_line=$(echo "$result" | grep "errors out of")
          if [ -n "$done_line" ]; then
            e=$(echo "$done_line" | awk '{print $1}')
            t=$(echo "$done_line" | awk '{print $5}')
            total=$((total + t))
            errors=$((errors + e))
            if [ "$e" != "0" ]; then
              echo "FAIL: $test — $done_line"
            fi
          else
            p=$(echo "$result" | grep -c "Ok$")
            total=$((total + p))
            echo "TIMEOUT: $test ($p passed)"
          fi
        done
        echo ""
        echo "=== Results: $total tests, $errors errors ==="
        if [ $errors -gt 0 ]; then
          echo "::error::$errors test errors detected"
          exit 1
        fi

    - name: Run large test files
      run: |
        cd build
        for test in func e_expr printf date randexpr1 enc4 fkey2 \
                     boundary1 boundary2 boundary3 select9; do
          result=$(timeout 180 ./testfixture ../test/${test}.test 2>&1)
          done_line=$(echo "$result" | grep "errors out of")
          if [ -n "$done_line" ]; then
            e=$(echo "$done_line" | awk '{print $1}')
            if [ "$e" != "0" ]; then
              echo "FAIL: $test — $done_line"
              exit 1
            else
              echo "OK: $test — $done_line"
            fi
          else
            p=$(echo "$result" | grep -c "Ok$")
            echo "TIMEOUT: $test ($p passed)"
          fi
        done
